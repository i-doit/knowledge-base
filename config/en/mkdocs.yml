# cSpell:disable
site_name: Knowledge Base
docs_dir: '../../docs/en'
site_dir: '../../generated/en'
site_url: https://kb.i-doit.com/en/
site_description: Knowledge Base
site_author: i-doit GmbH
copyright: Copyright &copy; 2026 i-doit GmbH
repo_url: https://github.com/i-doit/knowledge-base
edit_uri: edit/main/docs/en
strict: false
theme:
  name: material
  custom_dir: '../../overrides/'
  palette:
    - scheme: default
      primary: grey
      accent: red
      media: '(prefers-color-scheme: light)'
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: grey
      accent: red
      media: '(prefers-color-scheme: dark)'
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font: false
  logo: assets/images/logos/logo.svg
  language: de
  favicon: assets/images/logos/favicon.ico
  features:
    - content.action.edit
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.suggest
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      strict: false
  - redirects:
      redirect_maps:
        'i-doit-add-ons/isms.md': 'i-doit-add-ons/isms/index.md'
        'i-doit-add-ons/viva2.md': 'i-doit-add-ons/viva2/index.md'
