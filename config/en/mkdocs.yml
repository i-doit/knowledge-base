---
# cSpell:disable
site_name: Knowledge Base
docs_dir: '../../docs/en'
site_dir: '../../generated/en'
site_url: https://kb.i-doit.com/en/
site_description: Knowledge Base
site_author: i-doit GmbH
copyright: Copyright &copy; 2026 i-doit GmbH
repo_url: https://github.com/i-doit/knowledge-base
edit_uri: edit/main/docs/en
strict: true
theme:
  name: material
  custom_dir: '../../overrides/'
  palette:
    - scheme: default
      primary: grey
      accent: red
      media: '(prefers-color-scheme: light)'
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: grey
      accent: red
      media: '(prefers-color-scheme: dark)'
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font: false
  logo: assets/images/logos/logo.svg
  language: en
  favicon: assets/images/logos/favicon.ico
  features:
    - content.action.edit
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.suggest
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      strict: false
  - redirects:
      redirect_maps:
        'i-doit-add-ons/isms.md': 'i-doit-add-ons/isms/index.md'
        'i-doit-add-ons/viva2.md': 'i-doit-add-ons/viva2/index.md'
        'wartung-und-betrieb/lizenz-aktivieren.md': 'maintenance-and-operation/licensing.md'
        'automatisierung-und-integration/cli/console/index.md': 'automation-and-integration/cli/index.md'
        'automatisierung-und-integration/cli/console/optionen-und-parameter-der-console.md': 'automation-and-integration/cli/index.md'
        'automatisierung-und-integration/cli/console/verwendung-von-konfigurationsdateien-fuer-console-commands.md': 'automation-and-integration/cli/configuration-files.md'
        'daten-konsolidieren/jdisc-discovery.md': 'consolidate-data/jdisc/index.md'
        'upgrades-und-umzuege/update-anleitung-1.7.4-bis-31.md': 'upgrades-and-migrations/update-guide.md'
        'auswertungen/variable-reports.md': 'use-cases/variable-reports.md'
        'administration/verwaltung/import-und-schnittstellen/jdisc/index.md': 'i-doit-add-ons/jdisc-connector/index.md'
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.keys
  - toc:
      permalink: '#'
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic:
      mode: view
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - ../../overrides/.icons
  - pymdownx.highlight:
      linenums: true
      linenums_style: table
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  manifest: ../../overrides/manifest.webmanifest
  social:
    - name: i-doit on Twitter
